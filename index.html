<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>暖心 · 情感指导大师</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #ffeaf2 0%, #fff6e9 50%, #eafaf1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #5b4a44;
    }
    .chat-app {
      width: 100%;
      max-width: 540px;
      height: 88vh;
      max-height: 760px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      box-shadow: 0 18px 50px rgba(214, 158, 158, 0.28);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.6);
    }
    .chat-header {
      padding: 22px 26px;
      background: linear-gradient(120deg, #ffb6c1, #ffd1a9);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }
    .chat-header .title { font-size: 19px; font-weight: 600; }
    .chat-header .subtitle { font-size: 12.5px; opacity: 0.92; margin-top: 2px; }

    .chat-body {
      flex: 1;
      padding: 22px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-body::-webkit-scrollbar { width: 6px; }
    .chat-body::-webkit-scrollbar-thumb { background: rgba(255, 182, 193, 0.5); border-radius: 3px; }

    .msg { display: flex; gap: 10px; max-width: 82%; animation: rise 0.35s ease; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg .bubble {
      padding: 13px 17px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.bot { align-self: flex-start; }
    .msg.bot .bubble {
      background: #fff;
      border-bottom-left-radius: 6px;
      box-shadow: 0 4px 14px rgba(214, 158, 158, 0.15);
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.user .bubble {
      background: linear-gradient(120deg, #ffb6c1, #ffc6a0);
      color: #fff;
      border-bottom-right-radius: 6px;
    }
    .msg .mini-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
      background: rgba(255,255,255,0.8);
    }
    .msg.user .mini-avatar { background: rgba(255,255,255,0.55); }

    .typing .bubble { color: #b89b94; font-style: italic; }

    .chat-input {
      padding: 16px 18px;
      background: rgba(255,255,255,0.5);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input textarea {
      flex: 1;
      border: 1.5px solid rgba(255, 182, 193, 0.4);
      border-radius: 16px;
      padding: 12px 15px;
      font-size: 15px;
      resize: none;
      outline: none;
      font-family: inherit;
      max-height: 120px;
      background: #fff;
      color: #5b4a44;
      transition: border-color 0.2s;
    }
    .chat-input textarea:focus { border-color: #ffb6c1; }
    .chat-input button {
      border: none;
      border-radius: 16px;
      padding: 0 22px;
      height: 46px;
      background: linear-gradient(120deg, #ffb6c1, #ffc6a0);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
      flex-shrink: 0;
    }
    .chat-input button:hover { transform: translateY(-1px); }
    .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>
  <div class="chat-app">
    <div class="chat-header">
      <div class="avatar">🌸</div>
      <div>
        <div class="title">暖心</div>
        <div class="subtitle">你的情感指导大师 · 我在这里倾听你</div>
      </div>
    </div>

    <div class="chat-body" id="chatBody">
      <div class="msg bot">
        <div class="mini-avatar">🌸</div>
        <div class="bubble">嗨，我是暖心呀。今天的心情还好吗？无论是开心的、难过的，还是说不清的情绪，都可以和我说说，我会一直在这里陪着你。🍃</div>
      </div>
    </div>

    <div class="chat-input">
      <textarea id="input" rows="1" placeholder="说说你的心事…"></textarea>
      <button id="sendBtn">发送</button>
    </div>
  </div>

  <script>
    const chatBody = document.getElementById("chatBody");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    // 会话 ID：持久化到 localStorage，刷新页面也能延续同一段对话记忆
    let sessionId = localStorage.getItem("emotion_session_id");
    if (!sessionId) {
      sessionId = "s_" + Date.now() + "_" + Math.random().toString(36).slice(2, 10);
      localStorage.setItem("emotion_session_id", sessionId);
    }

    function addMessage(text, who) {
      const msg = document.createElement("div");
      msg.className = "msg " + who;
      const avatar = who === "bot" ? "🌸" : "🙂";
      msg.innerHTML = `<div class="mini-avatar">${avatar}</div><div class="bubble"></div>`;
      msg.querySelector(".bubble").textContent = text;
      chatBody.appendChild(msg);
      chatBody.scrollTop = chatBody.scrollHeight;
      return msg;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";
      input.style.height = "auto";
      sendBtn.disabled = true;

      const typing = document.createElement("div");
      typing.className = "msg bot typing";
      typing.innerHTML = `<div class="mini-avatar">🌸</div><div class="bubble">暖心正在认真听你说…</div>`;
      chatBody.appendChild(typing);
      chatBody.scrollTop = chatBody.scrollHeight;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, session_id: sessionId }),
        });
        const data = await res.json();
        typing.remove();
        addMessage(data.reply || "（暖心一时语塞了…）", "bot");
      } catch (e) {
        typing.remove();
        addMessage("网络好像断开了，等会儿再聊好吗？", "bot");
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });
  </script>
</body>
</html>
